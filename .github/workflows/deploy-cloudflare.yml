name: Deploy NEFES to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-workers-nefes
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Require and normalize Cloudflare secrets
        id: cf
        env:
          RAW_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          RAW_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          TOKEN="$(printf '%s' "$RAW_TOKEN" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          ACCOUNT="$(printf '%s' "$RAW_ACCOUNT" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          missing=0
          if [ -z "$TOKEN" ]; then
            echo "::error::Repository secret CLOUDFLARE_API_TOKEN is missing or empty."
            missing=1
          fi
          if [ -z "$ACCOUNT" ]; then
            echo "::error::Repository secret CLOUDFLARE_ACCOUNT_ID is missing or empty."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo "Add both secrets at: Settings → Secrets and variables → Actions"
            exit 1
          fi

          # Reject clearly wrong pastes (Zone ID / email / quoted values).
          if printf '%s' "$TOKEN" | grep -qE '^["'\'']|["'\'']$'; then
            echo "::error::CLOUDFLARE_API_TOKEN appears quoted. Paste the raw token only."
            exit 1
          fi
          if ! printf '%s' "$ACCOUNT" | grep -Eq '^[a-f0-9]{32}$'; then
            echo "::warning::CLOUDFLARE_ACCOUNT_ID is not a 32-char hex id (got length ${#ACCOUNT}). Deploy may fail."
          fi

          echo "token_len=${#TOKEN}"
          echo "account_len=${#ACCOUNT}"
          echo "account_prefix=${ACCOUNT:0:4}…"

          {
            echo "CLOUDFLARE_API_TOKEN=$TOKEN"
            echo "CLOUDFLARE_ACCOUNT_ID=$ACCOUNT"
          } >> "$GITHUB_ENV"

          # Pin account_id into wrangler.toml so Wrangler never guesses via /memberships.
          printf '\naccount_id = "%s"\n' "$ACCOUNT" >> wrangler.toml
          echo "---- wrangler.toml ----"
          cat wrangler.toml

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build Flutter Web (release)
        run: |
          set -euo pipefail
          flutter pub get
          flutter build web --release
          test -f build/web/main.dart.js
          test -f build/web/flutter.js
          test -d build/web/canvaskit
          test -d build/web/assets
          # Drop debug-only weight that is not needed at runtime.
          find build/web -type f \( -name '*.map' -o -name '*.symbols' \) -delete
          echo "Asset count:" && find build/web -type f | wc -l
          echo "Asset bytes:" && du -sb build/web | cut -f1

      - name: Verify Cloudflare auth
        continue-on-error: true
        run: |
          set +e
          npx --yes wrangler@4.40.3 whoami 2>&1 | tee whoami.log
          code=$?
          set -e
          echo "whoami_exit=$code"
          # Account-owned tokens often cannot read user email; that is OK.
          # Only treat hard auth failures as a warning here — deploy is the real gate.
          if grep -qiE 'not authenticated|Authentication error|code: 10000' whoami.log; then
            echo "::warning::Wrangler whoami reported an auth problem. Deploy will still be attempted."
          fi

      - name: Deploy to Cloudflare Workers
        run: |
          set -euo pipefail
          echo "Deploying prebuilt build/web via wrangler 4…"
          set +e
          npx --yes wrangler@4.40.3 deploy --config wrangler.toml 2>&1 | tee wrangler-deploy.log
          code=${PIPESTATUS[0]}
          set -e
          if [ "$code" -ne 0 ]; then
            echo "::error::Wrangler deploy failed with exit code $code"
            echo "::group::wrangler-deploy.log"
            cat wrangler-deploy.log
            echo "::endgroup::"
            if grep -qiE 'Authentication error|10000|unauthorized|not authenticated' wrangler-deploy.log; then
              echo "::error::Cloudflare rejected the API token. Recreate CLOUDFLARE_API_TOKEN using the 'Edit Cloudflare Workers' template (Account-owned token preferred) and confirm CLOUDFLARE_ACCOUNT_ID matches the nefes321 account."
            fi
            exit "$code"
          fi
          echo "Deploy succeeded."
          grep -E 'workers.dev|Deployed|Version' wrangler-deploy.log || true

      - name: Upload wrangler logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wrangler-deploy-logs
          path: |
            whoami.log
            wrangler-deploy.log
          if-no-files-found: ignore
