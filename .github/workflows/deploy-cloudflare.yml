name: Deploy NEFES to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-workers-nefes
  # Never cancel an in-flight Flutter download/build — re-runs were aborting
  # Setup Flutter mid-download ("The operation was canceled").
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          TOKEN="$(printf '%s' "$CLOUDFLARE_API_TOKEN" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          ACCOUNT="$(printf '%s' "$CLOUDFLARE_ACCOUNT_ID" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          missing=0
          if [ -z "$TOKEN" ]; then
            echo "::error::Repository secret CLOUDFLARE_API_TOKEN is missing or empty."
            missing=1
          fi
          if [ -z "$ACCOUNT" ]; then
            echo "::error::Repository secret CLOUDFLARE_ACCOUNT_ID is missing or empty."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo "Add both secrets at: Settings → Secrets and variables → Actions"
            exit 1
          fi

          if printf '%s' "$TOKEN" | grep -qE '[[:space:]]|^Bearer |^["'\'']|["'\'']$'; then
            echo "::error::CLOUDFLARE_API_TOKEN looks malformed (spaces/Bearer/quotes). Paste the raw token only."
            exit 1
          fi
          if ! printf '%s' "$ACCOUNT" | grep -Eq '^[a-f0-9]{32}$'; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID is invalid (length ${#ACCOUNT}, expected 32 hex chars)."
            echo "::error::Cloudflare Dashboard → Workers & Pages → Overview → Account ID (right sidebar)."
            exit 1
          fi

          echo "token_len=${#TOKEN}"
          echo "account_id_ok=yes"

          # Inject account_id at TOP LEVEL (after name=), NEVER under [assets].
          ACCOUNT="$ACCOUNT" python3 - <<'PY'
          from pathlib import Path
          import os
          account = os.environ["ACCOUNT"]
          path = Path("wrangler.toml")
          lines = path.read_text(encoding="utf-8").splitlines()
          out = []
          inserted = False
          for line in lines:
              if line.strip().startswith("account_id"):
                  continue
              out.append(line)
              if not inserted and line.startswith("name"):
                  out.append(f'account_id = "{account}"')
                  inserted = True
          if not inserted:
              out.insert(0, f'account_id = "{account}"')
          path.write_text("\n".join(out) + "\n", encoding="utf-8")
          print(path.read_text(encoding="utf-8"))
          PY

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build Flutter Web (release)
        run: |
          set -euo pipefail
          flutter pub get
          flutter build web --release
          test -f build/web/main.dart.js
          test -f build/web/flutter.js
          test -d build/web/canvaskit
          test -d build/web/assets
          find build/web -type f \( -name '*.map' -o -name '*.symbols' \) -delete
          echo "Asset count:" && find build/web -type f | wc -l
          echo "Asset bytes:" && du -sb build/web | cut -f1

      # Do NOT write the API token into GITHUB_ENV — special characters corrupt
      # the Authorization header (Cloudflare 6111 / 9106).
      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          export CLOUDFLARE_API_TOKEN="$(printf '%s' "$CLOUDFLARE_API_TOKEN" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          export CLOUDFLARE_ACCOUNT_ID="$(printf '%s' "$CLOUDFLARE_ACCOUNT_ID" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          echo "Deploying prebuilt build/web via wrangler 4…"
          set +e
          npx --yes wrangler@4.40.3 deploy --config wrangler.toml 2>&1 | tee wrangler-deploy.log
          code=${PIPESTATUS[0]}
          set -e
          if [ "$code" -ne 0 ]; then
            echo "::error::Wrangler deploy failed with exit code $code"
            echo "::group::wrangler-deploy.log"
            cat wrangler-deploy.log
            echo "::endgroup::"
            sed 's/\x1b\[[0-9;]*m//g' wrangler-deploy.log \
              | grep -Eiv '^(npm |$)' \
              | tail -n 40 \
              | while IFS= read -r line; do
                  [ -n "$line" ] && echo "::error::wrangler: $line"
                done
            if grep -qiE 'Authentication error|Authentication failed|10000|9106|6111|unauthorized|not authenticated' wrangler-deploy.log; then
              echo "::error::Cloudflare rejected the API token. Recreate CLOUDFLARE_API_TOKEN with template 'Edit Cloudflare Workers' (Account API Token), paste raw token only, and keep CLOUDFLARE_ACCOUNT_ID as the 32-char Account ID."
            fi
            exit "$code"
          fi
          echo "Deploy succeeded."
          grep -E 'workers.dev|Deployed|Version' wrangler-deploy.log || true

      - name: Upload wrangler logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wrangler-deploy-logs
          path: wrangler-deploy.log
          if-no-files-found: ignore
