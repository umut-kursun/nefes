name: Deploy NEFES to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-workers-nefes
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Require Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          missing=0
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Repository secret CLOUDFLARE_API_TOKEN is missing or empty."
            missing=1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Repository secret CLOUDFLARE_ACCOUNT_ID is missing or empty."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo "Add both secrets at: Settings → Secrets and variables → Actions"
            echo "Then re-run this workflow."
            exit 1
          fi
          echo "Cloudflare secrets are present."

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build Flutter Web (release)
        run: |
          flutter pub get
          flutter build web --release
          test -f build/web/main.dart.js
          test -f build/web/flutter.js
          test -d build/web/canvaskit
          test -d build/web/assets
          echo "Asset count:" && find build/web -type f | wc -l

      # GitHub Actions already produced build/web. Strip wrangler [build] so
      # deploy uploads assets only (no second Flutter install inside wrangler).
      - name: Prepare wrangler for prebuilt assets
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path("wrangler.toml")
          lines = path.read_text(encoding="utf-8").splitlines(keepends=True)
          out = []
          skipping = False
          for line in lines:
              if line.startswith("[build]"):
                  skipping = True
                  continue
              if skipping:
                  if line.startswith("["):
                      skipping = False
                  else:
                      continue
              if not skipping:
                  out.append(line)
          path.write_text("".join(out), encoding="utf-8")
          print("wrangler.toml prepared for prebuilt deploy:")
          print(path.read_text(encoding="utf-8"))
          PY

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "3.90.0"
          command: deploy
